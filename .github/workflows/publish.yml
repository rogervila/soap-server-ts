name: Publish Package

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup PHP with SOAP extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: soap
          coverage: none

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive version from tag
        id: release
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME}"
          version="${tag_name#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '${tag_name}' does not resolve to a valid semver package version. Use tags like v1.2.3, 1.2.3, or v1.2.3-beta.1."
            exit 1
          fi

          dist_tag="latest"
          if [[ "$version" == *-* ]]; then
            dist_tag="next"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${dist_tag}" >> "$GITHUB_OUTPUT"

      - name: Set package version from tag
        run: pnpm version "${{ steps.release.outputs.version }}" --no-git-tag-version

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: PHP_BIN="$(command -v php)" pnpm test

      - name: Worker bundle check
        run: pnpm run check:worker

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks --tag "${{ steps.release.outputs.dist_tag }}"
